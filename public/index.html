<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>latoile — Jira × GitLab context graph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  </head>
  <body>
    <main>
      <header class="app-bar">
        <h1>LaT&#10052;ile</h1>
        <form id="query-form" class="query">
          <div class="search-container">
            <input
              id="jira-key"
              type="text"
              placeholder="Search, ID (PV2-123), or MR link"
              autocomplete="off"
              spellcheck="false"
              title="Enter task number, full PV2 key, a search query, or a GitLab merge request URL"
            />
            <div id="search-results" class="search-results hidden"></div>
          </div>
          <label>Depth <input id="max-depth" type="number" min="0" value="1" /></label>
          <label>Nodes <input id="max-nodes" type="number" min="1" value="50" /></label>
          <button type="submit">Fetch Graph</button>
        </form>
        <div id="status" class="status"></div>
        <button type="button" id="theme-toggle" class="theme-toggle" title="Toggle theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </header>

      <div id="filters" class="filters"></div>
      <div id="cy"></div>
      <div id="legend" class="legend"></div>
      
      <div class="zoom-controls">
        <button id="zoom-in" type="button" title="Zoom in">+</button>
        <button id="zoom-out" type="button" title="Zoom out">−</button>
        <button id="zoom-fit" type="button" title="Fit graph">⤢</button>
        <div class="divider"></div>
        <button id="export-png" type="button" title="Export as PNG">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </button>
        <button id="export-json" type="button" title="Export as JSON">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        </button>
      </div>

      <aside id="details" class="details hidden">
        <p class="muted">Select a node to see its details. Double-click a node to open it in Jira/GitLab.</p>
      </aside>

      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <div id="loading-text" class="loading-text">Fetching data...</div>
      </div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
